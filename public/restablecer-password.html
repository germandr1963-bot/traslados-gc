<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nueva contraseña — Traslados GC</title>
  <link href="https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@500&family=Public+Sans:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/estilos.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Public Sans', 'Segoe UI', Arial, sans-serif;
      background: var(--gris-fondo);
      min-height: 100vh;
    }
    header.app {
      background: var(--charcoal);
      padding: 16px 20px;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      border-bottom: 3px solid var(--terracota);
    }
    header.app .marca {
      font-family: 'Big Shoulders Display', sans-serif;
      font-size: 28px;
      font-weight: 500;
      color: var(--texto-claro);
      letter-spacing: 2px;
      text-decoration: none;
      text-align: center;
      justify-self: center;
    }
    header.app a.nav { color: rgba(255,255,255,0.65); text-decoration: none; font-size: 14px; }
    header.app a.nav:hover { color: #fff; }
    header.app a.nav.izquierda { justify-self: start; }
    header.app a.nav.derecha { justify-self: end; }
    @media (max-width: 560px) {
      header.app { padding: 12px 14px; }
      header.app .marca { font-size: 19px; letter-spacing: 1px; }
      header.app a.nav { font-size: 12px; }
    }
    main {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px 60px;
    }
    h1 { font-family: 'Big Shoulders Display', sans-serif; font-size: clamp(32px, 6vw, 52px); color: var(--texto-oscuro); margin-bottom: 12px; }
    .subtitulo { color: var(--texto-muted); font-size: 19px; font-style: italic; letter-spacing: 0.3px; margin-bottom: 28px; line-height: 1.6; text-align: center; }
    .card {
      background: #fff;
      border: 1px solid var(--gris-borde);
      border-radius: 12px;
      padding: 20px;
      width: 100%;
      max-width: 520px;
    }
    .logo { text-align: center; margin-bottom: 32px; }
    .logo h1 { font-size: 22px; color: #C1502E; font-weight: 700; letter-spacing: 1px; margin-bottom: 0; }
    .logo p { font-size: 13px; color: #888; margin-top: 4px; }
    label { display: block; font-size: 13px; font-weight: 600; color: #444; margin-bottom: 5px; }
    input {
      width: 100%;
      border: 1.5px solid #ddd;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 15px;
      color: #2c2c2c;
      margin-bottom: 18px;
      transition: border-color 0.2s;
      font-family: inherit;
    }
    input:focus { outline: none; border-color: #C1502E; }
    .boton {
      width: 100%;
      background: #C1502E;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 12px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
    }
    .boton:disabled { opacity: 0.6; cursor: not-allowed; }
    .error { display: none; background: #fbe6e6; color: #8a2424; border-radius: 8px; padding: 10px 14px; font-size: 13px; margin-bottom: 16px; }
    .ok { display: none; background: #e6f7ee; color: #1c6e44; border-radius: 8px; padding: 20px; font-size: 14px; text-align: center; line-height: 1.6; }
    .oculto { display: none; }
    footer { text-align: center; padding: 30px; color: var(--texto-muted); font-size: 13px; }
  </style>
</head>
<body>
  <header class="app">
    <a href="/" class="nav izquierda">Inicio</a>
    <a href="/" class="marca">TRASLADOS · GC</a>
    <a href="/contacto" class="nav derecha">Contacto</a>
  </header>
  <main>
  <h1>Restablecer contraseña</h1>
  <p class="subtitulo">Elige tu nueva contraseña de acceso</p>
  <div class="card">

    <div id="pantalla-form">
      <div id="error-msg" class="error"></div>
      <label for="pwd1">Nueva contraseña</label>
      <input type="password" id="pwd1" placeholder="Mínimo 6 caracteres">
      <label for="pwd2">Repite la contraseña</label>
      <input type="password" id="pwd2" placeholder="Repite la contraseña">
      <button class="boton" id="btn-guardar" onclick="guardar()">Guardar y entrar</button>
    </div>

    <div id="pantalla-ok" class="ok">
      ✅ Tu contraseña se ha actualizado correctamente. Ya puedes acceder con ella.
    </div>
  </div>
  </main>

  <footer>
    <div style="margin-bottom:12px;">
      <a href="/rutas" style="color:var(--texto-muted);text-decoration:none;margin:0 12px;font-size:13px;">Rutas</a>
      <a href="/flota" style="color:var(--texto-muted);text-decoration:none;margin:0 12px;font-size:13px;">Flota</a>
      <a href="/contacto" style="color:var(--texto-muted);text-decoration:none;margin:0 12px;font-size:13px;">Contacto</a>
      <a href="/chofer/acceso/alta" style="color:var(--texto-muted);text-decoration:none;margin:0 12px;font-size:13px;">Alta choferes</a>
      <a href="/chofer/acceso" style="color:var(--texto-muted);text-decoration:none;margin:0 12px;font-size:13px;">Acceso a choferes</a>
      <a href="/mi-reserva" style="color:var(--texto-muted);text-decoration:none;margin:0 12px;font-size:13px;">Acceso clientes</a>
    </div>
    Traslados · GC — Gran Canaria
  </footer>

  <script>
    var params = new URLSearchParams(window.location.search);
    var token = params.get('token') || '';
    var tipo = params.get('tipo') || '';

    if (!token || !tipo) {
      document.getElementById('error-msg').textContent = 'Este enlace no es válido.';
      document.getElementById('error-msg').style.display = 'block';
      document.getElementById('btn-guardar').disabled = true;
    }

    document.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') guardar();
    });

    function guardar() {
      var p1 = document.getElementById('pwd1').value;
      var p2 = document.getElementById('pwd2').value;
      var err = document.getElementById('error-msg');
      err.style.display = 'none';

      if (!p1 || p1.length < 6) { err.textContent = 'Mínimo 6 caracteres.'; err.style.display = 'block'; return; }
      if (p1 !== p2) { err.textContent = 'Las contraseñas no coinciden.'; err.style.display = 'block'; return; }

      var btn = document.getElementById('btn-guardar');
      btn.disabled = true; btn.textContent = 'Guardando...';

      fetch('/api/restablecer-password', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token: token, password_nueva: p1 })
      })
      .then(function(r) { return r.json(); })
      .then(function(d) {
        if (d.error) {
          err.textContent = d.error;
          err.style.display = 'block';
          btn.disabled = false; btn.textContent = 'Guardar y entrar';
          return;
        }
        document.getElementById('pantalla-form').classList.add('oculto');
        document.getElementById('pantalla-ok').style.display = 'block';
        setTimeout(function() {
          window.location.href = tipo === 'chofer' ? '/chofer/acceso' : '/mi-reserva';
        }, 2500);
      })
      .catch(function() {
        err.textContent = 'Error de conexión. Inténtalo de nuevo.';
        err.style.display = 'block';
        btn.disabled = false; btn.textContent = 'Guardar y entrar';
      });
    }
  </script>
</body>
</html>
