<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flota — Traslados GC</title>
  <link href="https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@500&family=Public+Sans:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/estilos.css">
  <style>
    body { background: var(--gris-fondo); color: var(--texto-oscuro); min-height: 100vh; }
    header.app {
      background: var(--charcoal);
      padding: 16px 20px;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      border-bottom: 3px solid var(--terracota);
    }
    header.app .marca {
      font-family: 'Big Shoulders Display', sans-serif;
      font-size: 28px;
      font-weight: 500;
      color: var(--texto-claro);
      letter-spacing: 2px;
      text-decoration: none;
      text-align: center;
      justify-self: center;
    }
    header.app a.nav { color: rgba(255,255,255,0.65); text-decoration: none; font-size: 14px; }
    header.app a.nav:hover { color: #fff; }
    header.app a.nav.izquierda { justify-self: start; }
    header.app a.nav.derecha { justify-self: end; }
    @media (max-width: 560px) {
      header.app { padding: 12px 14px; }
      header.app .marca { font-size: 19px; letter-spacing: 1px; }
      header.app a.nav { font-size: 12px; }
    }
    .contenido { max-width: 700px; margin: 0 auto; padding: 40px 24px 80px; text-align: center; }
    h1 { font-family: 'Big Shoulders Display', sans-serif; font-size: clamp(32px, 6vw, 52px); margin-bottom: 12px; color: var(--texto-oscuro); }
    .subtitulo { color: var(--texto-muted); font-size: 19px; font-style: italic; letter-spacing: 0.3px; margin-bottom: 48px; line-height: 1.6; }
    .aviso { color: var(--texto-muted); font-size: 14px; }
    @media (max-width: 600px) { .contenido { padding: 24px 16px 60px; } }
    footer { text-align: center; padding: 30px; color: var(--texto-muted); font-size: 13px; }
  </style>
</head>
<body>
  <header class="app">
    <a href="/" class="nav izquierda">Inicio</a>
    <a href="/" class="marca">TRASLADOS · GC</a>
    <a href="/contacto" class="nav derecha">Contacto</a>
  </header>
  <div class="contenido">
    <h1>Flota</h1>
    <p class="subtitulo">Conoce los vehículos que te llevarán a tu destino</p>
    <p class="aviso">Estamos preparando esta sección. Muy pronto podrás ver aquí toda nuestra flota.</p>
  </div>
  <footer>
    <div style="margin-bottom:12px;">
      <a href="/rutas" style="color:var(--texto-muted);text-decoration:none;margin:0 12px;font-size:13px;">Rutas</a>
      <a href="/flota" style="color:var(--texto-muted);text-decoration:none;margin:0 12px;font-size:13px;">Flota</a>
      <a href="/contacto" style="color:var(--texto-muted);text-decoration:none;margin:0 12px;font-size:13px;">Contacto</a>
      <a href="/chofer/acceso/alta" style="color:var(--texto-muted);text-decoration:none;margin:0 12px;font-size:13px;">Alta choferes</a>
      <a href="/chofer/acceso" style="color:var(--texto-muted);text-decoration:none;margin:0 12px;font-size:13px;">Acceso a choferes</a>
      <a href="/mi-reserva" style="color:var(--texto-muted);text-decoration:none;margin:0 12px;font-size:13px;">Acceso clientes</a>
    </div>
    Traslados · GC — Gran Canaria
  </footer>
</body>
</html>
