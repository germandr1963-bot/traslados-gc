<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portal Chofer — Traslados GC</title>
  <link rel="stylesheet" href="/estilos-chofer.css">
  <style>
    .filtros-barra {
      display:flex; gap:8px; flex-wrap:wrap; margin-bottom:16px;
    }
    .filtro-btn {
      padding:7px 16px; border-radius:20px; border:1px solid var(--borde);
      background:#fff; font-size:13px; cursor:pointer; font-weight:500;
      color:#5a6c79;
    }
    .filtro-btn.activo { background:var(--costa); color:#fff; border-color:var(--costa); }
    .reserva-card {
      border:1px solid var(--borde); border-radius:12px;
      margin-bottom:12px; overflow:hidden; background:#fff;
    }
    .reserva-card-cabecera {
      display:flex; align-items:center; justify-content:space-between;
      padding:14px 16px; cursor:pointer; gap:10px;
    }
    .reserva-card-cabecera:hover { background:#f9f8f6; }
    .reserva-pnr {
      font-family:monospace; font-size:14px; font-weight:700;
      color:var(--costa); flex-shrink:0;
    }
    .reserva-resumen { flex:1; min-width:0; }
    .reserva-ruta { font-size:14px; font-weight:600; color:#1C1815; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .reserva-meta { font-size:12px; color:#5a6c79; margin-top:2px; }
    .reserva-badges { display:flex; gap:6px; align-items:center; flex-shrink:0; }
    .badge-msg {
      background:#e65100; color:#fff; border-radius:10px;
      padding:2px 8px; font-size:11px; font-weight:700;
    }
    .reserva-chevron { color:#aaa; font-size:14px; flex-shrink:0; }
    .reserva-cuerpo { display:none; padding:16px; border-top:1px solid var(--borde); background:#fafaf8; }
    .reserva-cuerpo.abierto { display:block; }
    .detalle-fila { font-size:13px; color:#333; margin-bottom:6px; }
    .detalle-fila strong { color:#1C1815; }
    .seccion-label {
      font-size:12px; font-weight:700; color:#888; letter-spacing:0.5px;
      text-transform:uppercase; margin:14px 0 8px;
    }
    .hilo-mensajes {
      display:flex; flex-direction:column; gap:8px;
      max-height:220px; overflow-y:auto; margin-bottom:10px;
    }
    .msg-burbuja {
      border-radius:8px; padding:9px 13px; font-size:13px; line-height:1.5;
    }
    .msg-equipo { background:#e8f5e9; border:1px solid #c8e6c9; }
    .msg-equipo .msg-autor { font-weight:600; color:#2e7d32; font-size:12px; margin-bottom:3px; }
    .msg-sin { font-size:13px; color:#aaa; text-align:center; padding:10px 0; }
    .boton-cartel {
      background:var(--costa); color:#fff; border:none; border-radius:8px;
      padding:10px 20px; font-size:13px; font-weight:700; cursor:pointer; width:100%;
      margin-top:10px;
    }
    .boton-cartel:disabled { opacity:0.5; cursor:not-allowed; }
  </style>
</head>
<body>
  <header class="app">
    <div style="display:flex;align-items:center;gap:10px"><span style="font-weight:700">TRASLADOS GC</span></div>
    <a href="javascript:void(0)" onclick="cerrarSesion()">Cerrar sesión</a>
  </header>

  <main>
    <section id="zona-panel">
      <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;margin-bottom:4px">
        <h1 id="saludo" style="margin:0">Hola</h1>
        <button class="secundario" style="margin:0;padding:8px 18px" onclick="mostrarPanel()">🔄 Actualizar</button>
      </div>
      <p class="sub" id="texto-estado"></p>

      <div class="tarjeta" id="ficha-vehiculo"></div>

      <div class="reserva-card" id="tarjeta-mi-perfil">
        <div class="reserva-card-cabecera" onclick="toggleMiPerfil()">
          <div class="reserva-resumen"><span class="reserva-ruta">👤 Mi perfil</span></div>
          <span class="reserva-chevron" id="mi-perfil-chevron">▼</span>
        </div>
        <div class="reserva-cuerpo" id="mi-perfil-cuerpo"></div>
      </div>

      <div class="tarjeta">
        <h2 style="margin-top:0">Mis reservas</h2>

        <div class="filtros-barra">
          <button class="filtro-btn activo" id="filtro-todas" onclick="aplicarFiltro('todas')">Todas</button>
          <button class="filtro-btn" id="filtro-hoy" onclick="aplicarFiltro('hoy')">Hoy</button>
          <button class="filtro-btn" id="filtro-proximas" onclick="aplicarFiltro('proximas')">Próximas</button>
        </div>

        <div id="lista-reservas"><p style="color:#5a6c79;font-size:14px">Cargando...</p></div>
      </div>

      <button class="secundario" onclick="cerrarSesion()">Cerrar sesión</button>
    </section>
  </main>

  <script>
    var todasLasReservas = [];
    var filtroActual = 'todas';

    const TEXTOS_ESTADO = {
      pendiente: 'Tu solicitud está en revisión. Te avisaremos cuando la administración apruebe tu cuenta.',
      aprobado: 'Tu cuenta está aprobada. Ya formas parte de la plataforma.',
      suspendido: 'Tu cuenta está suspendida. Contacta con la administración.'
    };

    async function mostrarPanel() {
      const r = await fetch('/chofer/me');
      if (!r.ok) { window.location.href = '/chofer/login'; return; }
      const { conductor } = await r.json();
      document.getElementById('saludo').textContent = 'Hola, ' + conductor.nombre;
      document.getElementById('texto-estado').innerHTML =
        '<span class="etiqueta ' + conductor.estado + '">' + conductor.estado.toUpperCase() + '</span> ' +
        TEXTOS_ESTADO[conductor.estado];
      const TEXTOS_FOTO = {
        sin_foto: '📷 Aún no has subido tu foto de carné.',
        pendiente: '🕐 Tu foto está pendiente de revisión por la administración.',
        aprobada: '✅ Foto aprobada: los pasajeros ya la ven.',
        rechazada: '❌ Foto rechazada' + (conductor.foto_motivo ? ': ' + conductor.foto_motivo : '') + '. Sube otra, por favor.'
      };
      document.getElementById('ficha-vehiculo').innerHTML =
        '<h2 style="margin-top:0">Tu vehículo</h2>' +
        (conductor.foto ? '<img src="' + conductor.foto + '" alt="Foto de carné" style="width:90px;height:90px;object-fit:cover;border-radius:50%;border:2px solid var(--borde);float:right;margin-left:10px">' : '') +
        '<p><strong>' + (conductor.vehiculo_marca || '—') + ' ' + (conductor.vehiculo_modelo || '') + '</strong>' +
        (conductor.categoria ? ' · Categoría <strong>' + conductor.categoria + '</strong>' : '') + '<br>' +
        'Matrícula: ' + (conductor.matricula || '—') + ' · Nº de taxi: <strong>' + (conductor.numero_taxi || '—') + '</strong><br>' +
        'Licencia: ' + (conductor.numero_licencia || '—') + ' (' + (conductor.municipio_licencia || '—') + ')<br>' +
        'Plazas: ' + conductor.plazas + ' · Isla: ' + conductor.isla + '</p>' +
        '<p style="font-size:0.88rem">' + (TEXTOS_FOTO[conductor.foto_estado || 'sin_foto']) + '</p>' +
        '<label for="archivo-foto" style="margin-top:10px">📷 ' + (conductor.foto ? 'Cambiar' : 'Subir') + ' foto de carné (será revisada por la administración antes de mostrarse)</label>' +
        '<input type="file" id="archivo-foto" accept="image/*" onchange="subirFoto(this)">';
      pintarMiPerfil(conductor);
      await cargarReservas();
    }

    async function cargarReservas() {
      const r = await fetch('/chofer/mis-reservas');
      if (!r.ok) return;
      const data = await r.json();
      todasLasReservas = data.reservas || [];
      renderizarReservas();
    }

    function aplicarFiltro(filtro) {
      filtroActual = filtro;
      document.querySelectorAll('.filtro-btn').forEach(function(b) { b.classList.remove('activo'); });
      document.getElementById('filtro-' + filtro).classList.add('activo');
      renderizarReservas();
    }

    function renderizarReservas() {
      var hoy = new Date(); hoy.setHours(0,0,0,0);
      var manana = new Date(hoy); manana.setDate(manana.getDate() + 1);

      var reservas = todasLasReservas.filter(function(r) {
        if (!r.fecha) return filtroActual === 'todas';
        var f = new Date(r.fecha); f.setHours(0,0,0,0);
        if (filtroActual === 'hoy') return f.getTime() === hoy.getTime();
        if (filtroActual === 'proximas') return f >= manana;
        return true;
      });

      var lista = document.getElementById('lista-reservas');
      if (!reservas.length) {
        lista.innerHTML = '<p style="color:#5a6c79;font-size:14px;text-align:center;padding:20px 0">No hay reservas para este filtro.</p>';
        return;
      }

      lista.innerHTML = reservas.map(function(r) {
        var fecha = r.fecha ? new Date(r.fecha).toLocaleDateString('es-ES', {weekday:'long', day:'numeric', month:'long'}) : '—';
        var hora = r.hora ? r.hora.slice(0,5) : '—';
        var tieneMsg = parseInt(r.mensajes_nuevos) > 0;

        var llegada = '';
        if (r.numero_vuelo) llegada = '✈️ Vuelo ' + r.numero_vuelo + (r.hora_llegada_vuelo ? ' · Llegada ' + r.hora_llegada_vuelo.slice(0,5) : '');
        else if (r.nombre_barco) llegada = '🚢 ' + r.nombre_barco + (r.hora_atraque ? ' · Atraque ' + r.hora_atraque.slice(0,5) : '');

        return '<div class="reserva-card" id="card-' + r.id + '">' +
          '<div class="reserva-card-cabecera" onclick="toggleReserva(' + r.id + ')">' +
            '<span class="reserva-pnr">' + r.numero_reserva + '</span>' +
            '<div class="reserva-resumen">' +
              '<div class="reserva-ruta">' + (r.origen||'—') + ' → ' + (r.destino||'—') + '</div>' +
              '<div class="reserva-meta">📅 ' + fecha + ' · ' + hora + 'h · ' + (r.num_pasajeros||'—') + ' pax</div>' +
            '</div>' +
            '<div class="reserva-badges">' +
              (tieneMsg ? '<span class="badge-msg">💬 ' + r.mensajes_nuevos + '</span>' : '') +
            '</div>' +
            '<span class="reserva-chevron" id="chev-' + r.id + '">▼</span>' +
          '</div>' +
          '<div class="reserva-cuerpo" id="cuerpo-' + r.id + '">' +
            '<div class="detalle-fila"><strong>Ruta:</strong> ' + (r.origen||'—') + ' → ' + (r.destino||'—') + '</div>' +
            '<div class="detalle-fila"><strong>Fecha:</strong> ' + fecha + '</div>' +
            '<div class="detalle-fila"><strong>Hora de recogida:</strong> ' + hora + '</div>' +
            '<div class="detalle-fila"><strong>Pasajeros:</strong> ' + (r.num_pasajeros||'—') + '</div>' +
            '<div class="detalle-fila"><strong>Categoría:</strong> ' + (r.categoria_nombre||'—') + '</div>' +
            (r.nombre_cliente ? '<div class="detalle-fila"><strong>Cliente:</strong> ' + r.nombre_cliente + '</div>' : '') +
            (llegada ? '<div class="detalle-fila">' + llegada + '</div>' : '') +
            (r.direccion_recogida ? '<div class="detalle-fila"><strong>Recogida:</strong> ' + r.direccion_recogida + '</div>' : '') +
            (r.direccion_destino ? '<div class="detalle-fila"><strong>Destino:</strong> ' + r.direccion_destino + '</div>' : '') +
            (r.notas_cliente ? '<div class="detalle-fila"><strong>Notas:</strong> ' + r.notas_cliente + '</div>' : '') +

            '<div class="seccion-label">Mensajes del equipo</div>' +
            '<div class="hilo-mensajes" id="hilo-' + r.id + '"><div class="msg-sin">Cargando...</div></div>' +

            '<button class="boton-cartel" id="btn-cartel-' + r.id + '" onclick="descargarCartel(' + r.id + ',\'' + r.numero_reserva + '\')">📄 Descargar cartel</button>' +
          '</div>' +
        '</div>';
      }).join('');
    }

    function toggleReserva(id) {
      var cuerpo = document.getElementById('cuerpo-' + id);
      var chev = document.getElementById('chev-' + id);
      var abierto = cuerpo.classList.contains('abierto');
      if (abierto) {
        cuerpo.classList.remove('abierto');
        chev.textContent = '▼';
      } else {
        cuerpo.classList.add('abierto');
        chev.textContent = '▲';
        cargarMensajesChofer(id);
      }
    }

    function cargarMensajesChofer(reservaId) {
      var hilo = document.getElementById('hilo-' + reservaId);
      fetch('/chofer/mensajes/' + reservaId)
        .then(function(r) { return r.json(); })
        .then(function(d) {
          if (!d.mensajes || !d.mensajes.length) {
            hilo.innerHTML = '<div class="msg-sin">Sin mensajes del equipo para esta reserva.</div>';
            // Quitar badge
            var card = document.getElementById('card-' + reservaId);
            if (card) { var b = card.querySelector('.badge-msg'); if (b) b.remove(); }
            return;
          }
          hilo.innerHTML = d.mensajes.map(function(m) {
            var fecha = new Date(m.creado_en).toLocaleDateString('es-ES', {day:'numeric', month:'short', hour:'2-digit', minute:'2-digit'});
            return '<div class="msg-burbuja msg-equipo">' +
              '<div class="msg-autor">👨‍💼 Equipo · ' + fecha + '</div>' +
              '<div>' + m.mensaje.replace(/</g,'&lt;').replace(/>/g,'&gt;').split('\n').join('<br>') + '</div>' +
            '</div>';
          }).join('');
          hilo.scrollTop = hilo.scrollHeight;
          // Quitar badge tras leer
          var card = document.getElementById('card-' + reservaId);
          if (card) { var b = card.querySelector('.badge-msg'); if (b) b.remove(); }
        })
        .catch(function() {
          hilo.innerHTML = '<div class="msg-sin">Error al cargar mensajes.</div>';
        });
    }

    function descargarCartel(reservaId, pnr) {
      var btn = document.getElementById('btn-cartel-' + reservaId);
      btn.textContent = 'Generando...'; btn.disabled = true;
      fetch('/chofer/cartel/' + reservaId)
        .then(function(r) { if (!r.ok) throw new Error(); return r.blob(); })
        .then(function(blob) {
          var url = URL.createObjectURL(blob);
          var a = document.createElement('a'); a.href = url;
          a.download = 'cartel-' + pnr + '.docx'; a.click();
          URL.revokeObjectURL(url);
          btn.textContent = '📄 Descargar cartel'; btn.disabled = false;
        })
        .catch(function() {
          btn.textContent = '❌ Error'; btn.disabled = false;
          setTimeout(function() { btn.textContent = '📄 Descargar cartel'; }, 2000);
        });
    }

    function subirFoto(entrada) {
      const archivo = entrada.files && entrada.files[0];
      if (!archivo) return;
      const lector = new FileReader();
      lector.onload = function(evento) {
        const imagen = new Image();
        imagen.onload = async function() {
          const lado = Math.min(imagen.width, imagen.height);
          const escala = Math.min(1, 400 / lado);
          const lienzo = document.createElement('canvas');
          lienzo.width = Math.round(imagen.width * escala);
          lienzo.height = Math.round(imagen.height * escala);
          lienzo.getContext('2d').drawImage(imagen, 0, 0, lienzo.width, lienzo.height);
          const datos = lienzo.toDataURL('image/jpeg', 0.8);
          const r = await fetch('/chofer/foto', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ foto: datos })
          });
          const respuesta = await r.json();
          if (respuesta.ok) { alert('Foto enviada. 📷 Quedará visible cuando la administración la apruebe.'); mostrarPanel(); }
          else alert(respuesta.error);
        };
        imagen.src = evento.target.result;
      };
      lector.readAsDataURL(archivo);
    }

    function escapar(texto) {
      var div = document.createElement('div');
      div.textContent = (texto === null || texto === undefined) ? '' : texto;
      return div.innerHTML;
    }

    var catalogoPerfilCache = null;
    var conductorActual = null;

    function toggleMiPerfil() {
      document.getElementById('mi-perfil-cuerpo').classList.toggle('abierto');
      var abierto = document.getElementById('mi-perfil-cuerpo').classList.contains('abierto');
      document.getElementById('mi-perfil-chevron').textContent = abierto ? '▲' : '▼';
    }

    function opcionesMarcaPerfil(valorActual) {
      var norm = (valorActual || '').trim().toLowerCase();
      var encontrada = norm ? catalogoPerfilCache.find(function (m) { return m.nombre.trim().toLowerCase() === norm; }) : null;
      var marcaIdActual = encontrada ? encontrada.id : null;
      var esOtra = !!(valorActual && !encontrada);
      var opts = '<option value="">— Selecciona la marca —</option>' +
        catalogoPerfilCache.map(function (m) {
          return '<option value="' + m.id + '"' + (m.id === marcaIdActual ? ' selected' : '') + '>' + escapar(m.nombre) + '</option>';
        }).join('') +
        '<option value="__nueva"' + (esOtra ? ' selected' : '') + '>➕ Otra marca</option>';
      return { opts: opts, marcaIdActual: marcaIdActual, esOtra: esOtra };
    }

    function opcionesModeloPerfil(marcaIdActual, valorActual) {
      var marca = marcaIdActual ? catalogoPerfilCache.find(function (m) { return m.id === marcaIdActual; }) : null;
      var norm = (valorActual || '').trim().toLowerCase();
      var encontrado = (marca && norm) ? marca.modelos.find(function (mo) { return mo.nombre.trim().toLowerCase() === norm; }) : null;
      var esOtra = !!(valorActual && !encontrado);
      var opts = '<option value="">' + (marca ? '— Selecciona el modelo —' : '— Selecciona primero la marca —') + '</option>' +
        (marca ? marca.modelos.map(function (mo) {
          return '<option value="' + mo.id + '"' + (mo.id === (encontrado ? encontrado.id : null) ? ' selected' : '') + '>' + escapar(mo.nombre) + '</option>';
        }).join('') : '') +
        '<option value="__nuevo"' + (esOtra ? ' selected' : '') + '>➕ Otro modelo</option>';
      return { opts: opts, esOtra: esOtra };
    }

    function cambioMarcaPerfil() {
      var marcaVal = document.getElementById('p-vehiculo_marca').value;
      var esNueva = marcaVal === '__nueva';
      document.getElementById('p-vehiculo_marca-nueva-caja').classList.toggle('oculto', !esNueva);
      var marcaId = (!esNueva && marcaVal) ? parseInt(marcaVal, 10) : null;
      var info = opcionesModeloPerfil(marcaId, '');
      document.getElementById('p-vehiculo_modelo').innerHTML = info.opts;
      document.getElementById('p-vehiculo_modelo-nuevo-caja').classList.add('oculto');
    }

    function cambioModeloPerfil() {
      var modeloVal = document.getElementById('p-vehiculo_modelo').value;
      var esNuevo = modeloVal === '__nuevo';
      var caja = document.getElementById('p-vehiculo_modelo-nuevo-caja');
      caja.classList.toggle('oculto', !esNuevo);
      if (esNuevo) document.getElementById('p-vehiculo_modelo-nuevo').value = '';
    }

    function campoPerfil(etiqueta, id, valor) {
      return '<label class="etiqueta" style="display:block;margin-top:10px">' + etiqueta + '</label>' +
        '<input class="campo" id="p-' + id + '" type="text" value="' + escapar(valor == null ? '' : valor) + '" style="width:100%;box-sizing:border-box">';
    }

    function filaSoloLectura(etiqueta, valor) {
      return '<div style="font-size:13px;margin-top:8px"><strong>' + etiqueta + ':</strong> ' + escapar(valor || '—') + '</div>';
    }

    function pintarMiPerfil(conductor) {
      conductorActual = conductor;
      var cuerpo = document.getElementById('mi-perfil-cuerpo');

      if (!conductor.permitir_edicion_ficha) {
        cuerpo.innerHTML =
          '<p style="font-size:13px;color:#5a6c79">Si deseas modificar algún dato de tu ficha (teléfono, dirección, vehículo, etc.), solicita a la administración que te habilite la edición. Una vez habilitada, podrás hacer tus cambios y guardarlos; al guardar, la edición se desactiva de nuevo hasta la próxima vez que la necesites.</p>' +
          (conductor.cambios_pendientes ? '<p style="font-size:13px;color:#e65100;font-weight:600">🕐 Tienes cambios enviados esperando la aprobación de la administración.</p>' : '') +
          '<div style="margin-top:14px;padding-top:10px;border-top:1px solid var(--borde)">' +
            '<p style="font-size:12px;font-weight:700;color:#888;text-transform:uppercase;margin:0 0 4px">Tus datos actuales</p>' +
            filaSoloLectura('Nombre', conductor.nombre) +
            filaSoloLectura('Documento', conductor.documento) +
            filaSoloLectura('Teléfono', conductor.telefono) +
            filaSoloLectura('Email', conductor.email) +
            filaSoloLectura('Dirección', conductor.direccion) +
            filaSoloLectura('Código postal', conductor.cp) +
            filaSoloLectura('Municipio', conductor.municipio) +
            filaSoloLectura('Central de flota', conductor.central_flota) +
            filaSoloLectura('Marca', conductor.vehiculo_marca) +
            filaSoloLectura('Modelo', conductor.vehiculo_modelo) +
            filaSoloLectura('Matrícula', conductor.matricula) +
            filaSoloLectura('Nº de taxi', conductor.numero_taxi) +
            filaSoloLectura('Plazas', conductor.plazas) +
            filaSoloLectura('Isla', conductor.isla) +
          '</div>';
        return;
      }

      if (conductor.cambios_pendientes) {
        cuerpo.innerHTML = '<p style="font-size:13px;color:#e65100;font-weight:600">🕐 Ya has enviado cambios y están esperando la aprobación de la administración. Cuando se resuelvan, podrás volver a editar.</p>';
        return;
      }

      function pintarFormulario() {
        var marcaInfo = opcionesMarcaPerfil(conductor.vehiculo_marca);
        var modeloInfo = opcionesModeloPerfil(marcaInfo.marcaIdActual, conductor.vehiculo_modelo);
        cuerpo.innerHTML =
          '<p style="font-size:13px;color:#5a6c79;margin-top:0">Modifica lo que necesites. Nombre y documento no se pueden cambiar aquí. Al guardar, los cambios quedan pendientes de aprobación por la administración.</p>' +
          campoPerfil('Teléfono', 'telefono', conductor.telefono) +
          campoPerfil('Email', 'email', conductor.email) +
          campoPerfil('Dirección', 'direccion', conductor.direccion) +
          campoPerfil('Código postal', 'cp', conductor.cp) +
          campoPerfil('Municipio', 'municipio', conductor.municipio) +
          campoPerfil('Central de flota (opcional)', 'central_flota', conductor.central_flota) +
          '<label class="etiqueta" style="display:block;margin-top:10px">Marca del vehículo</label>' +
          '<select class="campo" id="p-vehiculo_marca" onchange="cambioMarcaPerfil()" style="width:100%;box-sizing:border-box">' + marcaInfo.opts + '</select>' +
          '<div id="p-vehiculo_marca-nueva-caja" class="' + (marcaInfo.esOtra ? '' : 'oculto') + '" style="margin-top:8px">' +
            '<label class="etiqueta">Nombre de la marca nueva</label>' +
            '<input class="campo" id="p-vehiculo_marca-nueva" type="text" value="' + escapar(marcaInfo.esOtra ? conductor.vehiculo_marca : '') + '" style="width:100%;box-sizing:border-box">' +
          '</div>' +
          '<label class="etiqueta" style="display:block;margin-top:10px">Modelo</label>' +
          '<select class="campo" id="p-vehiculo_modelo" onchange="cambioModeloPerfil()" style="width:100%;box-sizing:border-box">' + modeloInfo.opts + '</select>' +
          '<div id="p-vehiculo_modelo-nuevo-caja" class="' + (modeloInfo.esOtra ? '' : 'oculto') + '" style="margin-top:8px">' +
            '<label class="etiqueta">Escribe el nombre del modelo nuevo</label>' +
            '<input class="campo" id="p-vehiculo_modelo-nuevo" type="text" placeholder="Escribir aquí" value="' + escapar(modeloInfo.esOtra ? conductor.vehiculo_modelo : '') + '" style="width:100%;box-sizing:border-box">' +
          '</div>' +
          campoPerfil('Matrícula', 'matricula', conductor.matricula) +
          campoPerfil('Nº de taxi', 'numero_taxi', conductor.numero_taxi) +
          campoPerfil('Plazas', 'plazas', conductor.plazas) +
          campoPerfil('Isla', 'isla', conductor.isla) +
          '<div id="aviso-mi-perfil" style="display:none;margin-top:10px;font-size:13px"></div>' +
          '<button class="boton-cartel" style="margin-top:14px" onclick="guardarMiPerfil()">💾 Guardar cambios</button>';
      }

      if (catalogoPerfilCache) { pintarFormulario(); return; }
      fetch('/api/marcas-vehiculos').then(function (r) { return r.json(); }).then(function (marcas) {
        catalogoPerfilCache = marcas;
        pintarFormulario();
      });
    }

    async function guardarMiPerfil() {
      var aviso = document.getElementById('aviso-mi-perfil');
      aviso.style.display = 'none';

      var datos = {
        telefono: document.getElementById('p-telefono').value.trim(),
        email: document.getElementById('p-email').value.trim(),
        direccion: document.getElementById('p-direccion').value.trim(),
        cp: document.getElementById('p-cp').value.trim(),
        municipio: document.getElementById('p-municipio').value.trim(),
        central_flota: document.getElementById('p-central_flota').value.trim(),
        matricula: document.getElementById('p-matricula').value.trim(),
        numero_taxi: document.getElementById('p-numero_taxi').value.trim(),
        plazas: document.getElementById('p-plazas').value.trim(),
        isla: document.getElementById('p-isla').value.trim()
      };

      var marcaVal = document.getElementById('p-vehiculo_marca').value;
      if (marcaVal === '__nueva') {
        datos.vehiculo_marca = document.getElementById('p-vehiculo_marca-nueva').value.trim();
      } else {
        var marcaEl = document.getElementById('p-vehiculo_marca');
        datos.vehiculo_marca = (marcaEl.selectedOptions[0] || {}).text || '';
      }

      var modeloVal = document.getElementById('p-vehiculo_modelo').value;
      if (modeloVal === '__nuevo') {
        datos.vehiculo_modelo = document.getElementById('p-vehiculo_modelo-nuevo').value.trim();
      } else {
        var modeloEl = document.getElementById('p-vehiculo_modelo');
        datos.vehiculo_modelo = (modeloEl.selectedOptions[0] || {}).text || '';
      }

      if (!confirm('¿Enviar estos cambios para que la administración los apruebe?')) return;

      const r = await fetch('/chofer/mi-perfil', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(datos)
      });
      const respuesta = await r.json();
      if (respuesta.ok) {
        alert('Cambios enviados. Quedan pendientes de aprobación por la administración. ✓');
        mostrarPanel();
      } else {
        aviso.style.display = 'block';
        aviso.innerHTML = '<span style="color:#c0392b">' + respuesta.error + '</span>';
      }
    }

    async function cerrarSesion() {
      await fetch('/chofer/logout', { method: 'POST' });
      window.location.href = '/';
    }

    mostrarPanel();
  </script>
</body>
</html>
