<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portal Chofer вЂ” Traslados GC</title>
  <link rel="stylesheet" href="/estilos-chofer.css">
</head>
<body>
  <header class="app">
    <div style="display:flex;align-items:center;gap:10px"><span style="font-weight:700">TRASLADOS GC</span></div>
    <a href="javascript:void(0)" onclick="cerrarSesion()">Cerrar sesiГіn</a>
  </header>

  <main>
    <section id="zona-panel">
      <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;margin-bottom:4px">
        <h1 id="saludo" style="margin:0">Hola</h1>
        <button class="secundario" style="margin:0;padding:8px 18px" onclick="mostrarPanel()">рџ”„ Actualizar</button>
      </div>
      <p class="sub" id="texto-estado"></p>

      <div class="tarjeta" id="ficha-vehiculo"></div>

      <div class="tarjeta">
        <h2 style="margin-top:0">Reservas</h2>
        <div id="lista-reservas"><p style="color:#5a6c79;font-size:14px">Cargando...</p></div>
      </div>

      <button class="secundario" onclick="cerrarSesion()">Cerrar sesiГіn</button>
    </section>
  </main>

  <script>
    const TEXTOS_ESTADO = {
      pendiente: 'Tu solicitud estГЎ en revisiГіn. Te avisaremos cuando la administraciГіn apruebe tu cuenta.',
      aprobado: 'Tu cuenta estГЎ aprobada. Ya formas parte de la plataforma.',
      suspendido: 'Tu cuenta estГЎ suspendida. Contacta con la administraciГіn.'
    };

    async function mostrarPanel() {
      const r = await fetch('/chofer/me');
      if (!r.ok) { window.location.href = '/chofer/login'; return; }
      const { conductor } = await r.json();
      document.getElementById('saludo').textContent = 'Hola, ' + conductor.nombre;
      document.getElementById('texto-estado').innerHTML =
        '<span class="etiqueta ' + conductor.estado + '">' + conductor.estado.toUpperCase() + '</span> ' +
        TEXTOS_ESTADO[conductor.estado];
      const TEXTOS_FOTO = {
        sin_foto: 'рџ“· AГєn no has subido tu foto de carnГ©.',
        pendiente: 'рџ•ђ Tu foto estГЎ pendiente de revisiГіn por la administraciГіn.',
        aprobada: 'вњ… Foto aprobada: los pasajeros ya la ven.',
        rechazada: 'вќЊ Foto rechazada' + (conductor.foto_motivo ? ': ' + conductor.foto_motivo : '') + '. Sube otra, por favor.'
      };
      document.getElementById('ficha-vehiculo').innerHTML =
        '<h2 style="margin-top:0">Tu vehГ­culo</h2>' +
        (conductor.foto ? '<img src="' + conductor.foto + '" alt="Foto de carnГ©" style="width:90px;height:90px;object-fit:cover;border-radius:50%;border:2px solid var(--borde);float:right;margin-left:10px">' : '') +
        '<p><strong>' + (conductor.vehiculo_marca || 'вЂ”') + ' ' + (conductor.vehiculo_modelo || '') + '</strong>' +
        (conductor.categoria ? ' В· CategorГ­a <strong>' + conductor.categoria + '</strong>' : '') + '<br>' +
        'MatrГ­cula: ' + (conductor.matricula || 'вЂ”') + ' В· NВє de taxi: <strong>' + (conductor.numero_taxi || 'вЂ”') + '</strong><br>' +
        'Licencia: ' + (conductor.numero_licencia || 'вЂ”') + ' (' + (conductor.municipio_licencia || 'вЂ”') + ')<br>' +
        'Plazas: ' + conductor.plazas + ' В· Isla: ' + conductor.isla + '</p>' +
        '<p style="font-size:0.88rem">' + (TEXTOS_FOTO[conductor.foto_estado || 'sin_foto']) + '</p>' +
        '<label for="archivo-foto" style="margin-top:10px">рџ“· ' + (conductor.foto ? 'Cambiar' : 'Subir') + ' foto de carnГ© (serГЎ revisada por la administraciГіn antes de mostrarse)</label>' +
        '<input type="file" id="archivo-foto" accept="image/*" onchange="subirFoto(this)">';
    }

    function subirFoto(entrada) {
      const archivo = entrada.files && entrada.files[0];
      if (!archivo) return;
      const lector = new FileReader();
      lector.onload = function(evento) {
        const imagen = new Image();
        imagen.onload = async function() {
          const lado = Math.min(imagen.width, imagen.height);
          const escala = Math.min(1, 400 / lado);
          const lienzo = document.createElement('canvas');
          lienzo.width = Math.round(imagen.width * escala);
          lienzo.height = Math.round(imagen.height * escala);
          lienzo.getContext('2d').drawImage(imagen, 0, 0, lienzo.width, lienzo.height);
          const datos = lienzo.toDataURL('image/jpeg', 0.8);
          const r = await fetch('/chofer/foto', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ foto: datos })
          });
          const respuesta = await r.json();
          if (respuesta.ok) { alert('Foto enviada. рџ“· QuedarГЎ visible cuando la administraciГіn la apruebe.'); mostrarPanel(); }
          else alert(respuesta.error);
        };
        imagen.src = evento.target.result;
      };
      lector.readAsDataURL(archivo);
    }

    async function cerrarSesion() {
      await fetch('/chofer/logout', { method: 'POST' });
      window.location.href = '/chofer/login';
    }

    async function cargarReservas() {
      const r = await fetch('/chofer/mis-reservas');
      if (!r.ok) return;
      const data = await r.json();
      const lista = document.getElementById('lista-reservas');
      if (!data.reservas || !data.reservas.length) {
        lista.innerHTML = '<p style="color:#5a6c79;font-size:14px;text-align:center;padding:20px 0">No tienes reservas asignadas prГіximamente.</p>';
        return;
      }
      lista.innerHTML = data.reservas.map(function(r) {
        var fecha = r.fecha ? new Date(r.fecha).toLocaleDateString('es-ES', {weekday:'long', day:'numeric', month:'long', year:'numeric'}) : 'вЂ”';
        var hora = r.hora ? r.hora.slice(0,5) : 'вЂ”';
        return '<div style="border:1px solid var(--borde);border-radius:10px;padding:16px;margin-bottom:12px;background:#fafaf8">' +
          '<div style="font-family:monospace;font-size:15px;font-weight:700;color:var(--costa);margin-bottom:6px">' + r.numero_reserva + '</div>' +
          '<div style="font-size:15px;font-weight:600;margin-bottom:6px">' + (r.origen||'вЂ”') + ' в†’ ' + (r.destino||'вЂ”') + '</div>' +
          '<div style="font-size:13px;color:#5a6c79;margin-bottom:2px">рџ“… ' + fecha + ' В· ' + hora + 'h</div>' +
          '<div style="font-size:13px;color:#5a6c79;margin-bottom:2px">рџ‘¤ ' + (r.nombre_cliente||'вЂ”') + ' В· ' + (r.num_pasajeros||'вЂ”') + ' pasajeros</div>' +
          '<div style="font-size:13px;color:#5a6c79;margin-bottom:12px">рџљ— ' + (r.categoria_nombre||'вЂ”') + '</div>' +
          '<button id="btn-cartel-' + r.id + '" onclick="descargarCartel(' + r.id + ','' + r.numero_reserva + '')" ' +
          'style="background:var(--costa);color:#fff;border:none;border-radius:8px;padding:10px 18px;font-size:13px;font-weight:700;cursor:pointer">рџ“„ Descargar cartel</button>' +
        '</div>';
      }).join('');
    }

    function descargarCartel(reservaId, pnr) {
      var btn = document.getElementById('btn-cartel-' + reservaId);
      btn.textContent = 'Generando...'; btn.disabled = true;
      fetch('/chofer/cartel/' + reservaId)
        .then(function(r) { if (!r.ok) throw new Error(); return r.blob(); })
        .then(function(blob) {
          var url = URL.createObjectURL(blob);
          var a = document.createElement('a'); a.href = url;
          a.download = 'cartel-' + pnr + '.docx'; a.click();
          URL.revokeObjectURL(url);
          btn.textContent = 'рџ“„ Descargar cartel'; btn.disabled = false;
        })
        .catch(function() {
          btn.textContent = 'вќЊ Error'; btn.disabled = false;
          setTimeout(function() { btn.textContent = 'рџ“„ Descargar cartel'; }, 2000);
        });
    }

    mostrarPanel();
    cargarReservas();
  </script>
</body>
</html>
