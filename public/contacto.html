<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contacto — Traslados GC</title>
  <link href="https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@500&family=Public+Sans:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="estilos.css">
  <style>
    body { background: var(--gris-fondo); color: var(--texto-oscuro); min-height: 100vh; }
    header.app {
      background: var(--charcoal);
      padding: 16px 20px;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      border-bottom: 3px solid var(--terracota);
    }
    header.app .marca {
      font-family: 'Big Shoulders Display', sans-serif;
      font-size: 28px;
      font-weight: 500;
      color: var(--texto-claro);
      letter-spacing: 2px;
      text-decoration: none;
      text-align: center;
      justify-self: center;
    }
    header.app a.nav { color: rgba(255,255,255,0.65); text-decoration: none; font-size: 14px; }
    header.app a.nav:hover { color: #fff; }
    header.app a.nav.izquierda { justify-self: start; }
    header.app a.nav.derecha { justify-self: end; }
    @media (max-width: 560px) {
      header.app { padding: 12px 14px; }
      header.app .marca { font-size: 19px; letter-spacing: 1px; }
      header.app a.nav { font-size: 12px; }
    }
    .contenido { max-width: 700px; margin: 0 auto; padding: 40px 24px 80px; text-align: center; }
    h1 { font-family: 'Big Shoulders Display', sans-serif; font-size: clamp(32px, 6vw, 52px); margin-bottom: 12px; }
    h1 span { color: var(--terracota); }
    .subtitulo { color: var(--texto-muted); font-size: 15px; margin-bottom: 48px; line-height: 1.6; }
    .etiqueta-pagina {
      font-family: 'Big Shoulders Display', sans-serif;
      font-size: 14px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--terracota);
      margin-bottom: 10px;
    }
    .tarjetas { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; text-align: center; }
    .tarjeta-contacto {
      background: #fff;
      border: 1px solid var(--gris-borde);
      border-radius: 14px;
      padding: 24px 20px;
      text-align: center;
    }
    .icono { font-size: 28px; margin-bottom: 12px; }
    .etiqueta { font-size: 11px; color: var(--texto-muted); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 6px; }
    .valor { font-size: 15px; font-weight: 500; color: var(--texto-oscuro); }
    .valor a { color: var(--terracota); text-decoration: none; }
    .valor a:hover { text-decoration: underline; }
    .vacio { color: var(--texto-muted); font-size: 13px; }
    @media (max-width: 600px) { .contenido { padding: 24px 16px 60px; } }
  </style>
</head>
<body>
  <header class="app">
    <a href="/" class="nav izquierda">Inicio</a>
    <a href="/" class="marca">TRASLADOS · GC</a>
    <a href="/contacto" class="nav derecha">Contacto</a>
  </header>
  <div class="contenido">
    <p class="etiqueta-pagina">Contacto</p>
    <h1>Estamos aquí<br>para <span>ayudarte</span></h1>
    <p class="subtitulo">Ponte en contacto con nosotros para cualquier consulta sobre tu traslado en Gran Canaria.</p>
    <div class="tarjetas" id="tarjetas-contacto">
      <div class="tarjeta-contacto"><div class="icono">⏳</div><div class="vacio">Cargando...</div></div>
    </div>
  </div>
  <script>
    fetch('/api/contacto').then(function(r) { return r.json(); }).then(function(d) {
      var tarjetas = [];
      if (d.nombre_empresa) tarjetas.push('<div class="tarjeta-contacto"><div class="icono">🏢</div><div class="etiqueta">Empresa</div><div class="valor">' + d.nombre_empresa + '</div></div>');
      if (d.telefono) tarjetas.push('<div class="tarjeta-contacto"><div class="icono">📞</div><div class="etiqueta">Teléfono</div><div class="valor"><a href="tel:' + d.telefono + '">' + d.telefono + '</a></div></div>');
      if (d.whatsapp) tarjetas.push('<div class="tarjeta-contacto"><div class="icono">💬</div><div class="etiqueta">WhatsApp</div><div class="valor"><a href="https://wa.me/' + d.whatsapp.replace(/\s|\+/g,'') + '" target="_blank">' + d.whatsapp + '</a></div></div>');
      if (d.email) tarjetas.push('<div class="tarjeta-contacto"><div class="icono">✉️</div><div class="etiqueta">Email</div><div class="valor"><a href="mailto:' + d.email + '">' + d.email + '</a></div></div>');
      if (d.horario) tarjetas.push('<div class="tarjeta-contacto"><div class="icono">🕐</div><div class="etiqueta">Horario</div><div class="valor">' + d.horario + '</div></div>');
      if (d.direccion) tarjetas.push('<div class="tarjeta-contacto"><div class="icono">📍</div><div class="etiqueta">Dirección</div><div class="valor">' + d.direccion + '</div></div>');
      document.getElementById('tarjetas-contacto').innerHTML = tarjetas.length
        ? tarjetas.join('')
        : '<div class="tarjeta-contacto"><div class="vacio">Información de contacto no disponible.</div></div>';
    });
  </script>
</body>
</html>
