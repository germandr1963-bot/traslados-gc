<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mi Reserva — Traslados GC</title>
  <link rel="stylesheet" href="/estilos-chofer.css">
</head>
<body>
  <header class="app">
    <div style="display:flex;align-items:center;gap:10px"><span style="font-weight:700">TRASLADOS GC</span></div>
    <a href="javascript:void(0)" onclick="cerrarSesion()">Cerrar sesión</a>
  </header>

  <main>
    <section id="zona-portal">
      <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;margin-bottom:4px">
        <h1 id="saludo" style="margin:0">Mi reserva</h1>
        <button class="secundario" style="margin:0;padding:8px 18px" onclick="cargarPortal()">🔄 Actualizar</button>
      </div>

      <!-- Detalles del traslado -->
      <div class="tarjeta" id="bloque-detalles"></div>

      <!-- Depósito -->
      <div class="tarjeta" id="bloque-deposito"></div>

      <!-- Modificar datos -->
      <div class="tarjeta" id="bloque-modificar"></div>

      <!-- Mensajes -->
      <div class="tarjeta">
        <h2 style="margin-top:0">Mensajes al equipo</h2>
        <p style="font-size:13px;color:#5a6c79;margin-bottom:16px;">Escríbenos cualquier incidencia, retraso de vuelo o petición especial.</p>
        <div id="hilo-mensajes" style="display:flex;flex-direction:column;gap:10px;margin-bottom:16px;"></div>
        <textarea id="campo-mensaje" rows="3" placeholder="Ej: Mi vuelo llega con retraso, hora estimada 21:30…"
          style="width:100%;border:1.5px solid #ddd;border-radius:8px;padding:10px 14px;font-size:14px;font-family:inherit;resize:vertical;"></textarea>
        <button class="secundario" style="margin-top:10px;" onclick="enviarMensaje()">Enviar mensaje</button>
        <div id="aviso-mensaje" style="display:none;margin-top:10px;font-size:13px;"></div>
      </div>

      <button class="secundario" onclick="cerrarSesion()">Cerrar sesión</button>
    </section>
  </main>

  <script>
    async function cargarPortal() {
      const r = await fetch('/api/cliente/mi-reserva');
      if (!r.ok) { window.location.href = '/mi-reserva'; return; }
      const { reserva, extras, noshow } = await r.json();

      document.getElementById('saludo').textContent = 'Hola, ' + reserva.nombre_cliente.split(' ')[0];

      // Detalles
      var fecha = reserva.fecha ? new Date(reserva.fecha).toLocaleDateString('es-ES', {weekday:'long', day:'numeric', month:'long', year:'numeric'}) : '—';
      var hora = reserva.hora ? reserva.hora.slice(0,5) : '—';
      var estadoBadge = { pendiente: '🟡 Pendiente', confirmada: '🟢 Confirmada', completada: '✅ Completada', cancelada: '🔴 Cancelada' };
      var extrasHTML = extras.length ? extras.map(function(e) { return e.nombre + ' (+' + parseFloat(e.precio_en_reserva).toFixed(2) + ' €)'; }).join(', ') : '—';

      document.getElementById('bloque-detalles').innerHTML =
        '<h2 style="margin-top:0">Tu traslado</h2>' +
        '<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;font-size:14px;">' +
        '<div><strong>Reserva</strong><br><span style="font-family:monospace;font-size:16px;color:#C1502E;font-weight:700;">' + reserva.numero_reserva + '</span></div>' +
        '<div><strong>Estado</strong><br>' + (estadoBadge[reserva.estado] || reserva.estado) + '</div>' +
        '<div><strong>Ruta</strong><br>' + (reserva.origen || '—') + ' → ' + (reserva.destino || '—') + '</div>' +
        '<div><strong>Fecha y hora</strong><br>' + fecha + ' · ' + hora + 'h</div>' +
        '<div><strong>Pasajeros</strong><br>' + (reserva.num_pasajeros || '—') + '</div>' +
        '<div><strong>Categoría</strong><br>' + (reserva.categoria_nombre || '—') + '</div>' +
        '<div><strong>Precio estimado</strong><br>' + (reserva.precio_estimado ? parseFloat(reserva.precio_estimado).toFixed(2) + ' €' : '—') + '</div>' +
        '<div><strong>Extras</strong><br>' + extrasHTML + '</div>' +
        (reserva.numero_vuelo ? '<div><strong>Vuelo</strong><br>' + reserva.numero_vuelo + (reserva.hora_llegada_vuelo ? ' · Llegada ' + reserva.hora_llegada_vuelo.slice(0,5) : '') + '</div>' : '') +
        (reserva.nombre_barco ? '<div><strong>Barco</strong><br>' + reserva.nombre_barco + (reserva.hora_atraque ? ' · Atraque ' + reserva.hora_atraque.slice(0,5) : '') + '</div>' : '') +
        '</div>' +
        (reserva.conductor_nombre && reserva.deposito_pagado ?
          '<div style="margin-top:16px;padding:12px;background:#f5f0ea;border-radius:8px;display:flex;align-items:center;gap:14px;">' +
          (reserva.conductor_foto && reserva.conductor_foto_estado === 'aprobada' ? '<img src="' + reserva.conductor_foto + '" style="width:56px;height:56px;border-radius:50%;object-fit:cover;border:2px solid #C1502E;">' : '') +
          '<div><strong>Tu conductor</strong><br><span style="font-size:15px;">' + reserva.conductor_nombre + '</span></div></div>' : '');

      // Depósito
      var depHTML = '<h2 style="margin-top:0">Depósito de garantía</h2>';
      if (reserva.deposito_liberado) {
        depHTML += '<p style="color:#1b5e20;">✅ Depósito liberado. El importe retenido ha quedado libre en tu tarjeta.</p>';
      } else if (reserva.deposito_pagado) {
        depHTML += '<p style="color:#856404;">🔒 Depósito retenido de <strong>' + noshow.importe + ' €</strong>. Se liberará cuando el servicio se complete.</p>';
      } else {
        depHTML += '<p style="color:#5a6c79;">⏳ Depósito pendiente de pago.</p>';
      }
      if (noshow && reserva.estado !== 'completada' && reserva.estado !== 'cancelada') {
        var fechaLim = new Date(noshow.fecha_limite);
        var textoLim = fechaLim.toLocaleDateString('es-ES', {day:'numeric', month:'long', year:'numeric'}) + ' a las ' + fechaLim.toLocaleTimeString('es-ES', {hour:'2-digit', minute:'2-digit'});
        depHTML += '<p style="font-size:13px;color:#5a6c79;margin-top:8px;">' +
          (noshow.puede_modificar ? '📅 Cancelación gratuita hasta el <strong>' + textoLim + '</strong>.' : '🔒 El plazo de cancelación gratuita venció el <strong>' + textoLim + '</strong>.') + '</p>';
      }
      document.getElementById('bloque-deposito').innerHTML = depHTML;

      // Modificar datos
      var modHTML = '<h2 style="margin-top:0">Modificar datos</h2>';
      if (!noshow.puede_modificar) {
        modHTML += '<p style="color:#5a6c79;font-size:14px;">El plazo de modificación ha vencido. Usa el canal de mensajes para cualquier incidencia urgente.</p>';
      } else {
        modHTML +=
          '<div style="display:flex;flex-direction:column;gap:10px;">' +
          '<div><label style="font-size:12px;font-weight:600;color:#444;">Hora de recogida</label><input type="time" id="mod-hora" value="' + (reserva.hora ? reserva.hora.slice(0,5) : '') + '" style="width:100%;border:1.5px solid #ddd;border-radius:8px;padding:8px 12px;font-size:14px;font-family:inherit;margin-top:4px;"></div>' +
          '<div><label style="font-size:12px;font-weight:600;color:#444;">Número de vuelo</label><input type="text" id="mod-vuelo" value="' + (reserva.numero_vuelo || '') + '" placeholder="Ej: IB3456" style="width:100%;border:1.5px solid #ddd;border-radius:8px;padding:8px 12px;font-size:14px;font-family:inherit;margin-top:4px;"></div>' +
          '<div><label style="font-size:12px;font-weight:600;color:#444;">Dirección de recogida</label><input type="text" id="mod-recogida" value="' + (reserva.direccion_recogida || '') + '" style="width:100%;border:1.5px solid #ddd;border-radius:8px;padding:8px 12px;font-size:14px;font-family:inherit;margin-top:4px;"></div>' +
          '<div><label style="font-size:12px;font-weight:600;color:#444;">Dirección de destino</label><input type="text" id="mod-destino" value="' + (reserva.direccion_destino || '') + '" style="width:100%;border:1.5px solid #ddd;border-radius:8px;padding:8px 12px;font-size:14px;font-family:inherit;margin-top:4px;"></div>' +
          '<div><label style="font-size:12px;font-weight:600;color:#444;">Notas adicionales</label><textarea id="mod-notas" rows="2" style="width:100%;border:1.5px solid #ddd;border-radius:8px;padding:8px 12px;font-size:14px;font-family:inherit;margin-top:4px;resize:vertical;">' + (reserva.notas_cliente || '') + '</textarea></div>' +
          '<button class="secundario" onclick="guardarModificaciones()">Guardar cambios</button>' +
          '<div id="aviso-mod" style="display:none;font-size:13px;"></div>' +
          '</div>';
      }
      document.getElementById('bloque-modificar').innerHTML = modHTML;

      cargarMensajes();
    }

    async function guardarModificaciones() {
      var datos = {
        hora: document.getElementById('mod-hora') ? document.getElementById('mod-hora').value : null,
        numero_vuelo: document.getElementById('mod-vuelo') ? document.getElementById('mod-vuelo').value : null,
        direccion_recogida: document.getElementById('mod-recogida') ? document.getElementById('mod-recogida').value : null,
        direccion_destino: document.getElementById('mod-destino') ? document.getElementById('mod-destino').value : null,
        notas_cliente: document.getElementById('mod-notas') ? document.getElementById('mod-notas').value : null
      };
      var av = document.getElementById('aviso-mod');
      var r = await fetch('/api/cliente/modificar', {
        method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(datos)
      });
      var d = await r.json();
      av.style.display = 'block';
      av.style.color = d.ok ? '#1b5e20' : '#842029';
      av.textContent = d.ok ? '✅ Cambios guardados.' : (d.error || 'Error al guardar.');
    }

    async function cargarMensajes() {
      var r = await fetch('/api/cliente/mensajes');
      if (!r.ok) return;
      var d = await r.json();
      var hilo = document.getElementById('hilo-mensajes');
      if (!d.mensajes || !d.mensajes.length) { hilo.innerHTML = ''; return; }
      hilo.innerHTML = d.mensajes.map(function(m) {
        var fecha = new Date(m.creado_en).toLocaleDateString('es-ES', {day:'numeric', month:'short', hour:'2-digit', minute:'2-digit'});
        var esCliente = m.autor === 'cliente';
        return '<div style="background:' + (esCliente ? '#fff3e0' : '#e8f5e9') + ';border:1px solid ' + (esCliente ? '#ffe0b2' : '#c8e6c9') + ';border-radius:8px;padding:10px 14px;font-size:13px;max-width:85%;' + (esCliente ? 'align-self:flex-end;margin-left:auto;' : '') + '">' +
          '<strong style="color:' + (esCliente ? '#e65100' : '#2e7d32') + ';">' + (esCliente ? '👤 Tú' : '👨‍💼 Equipo') + '</strong>' +
          '<span style="color:#999;font-size:11px;margin-left:8px;">' + fecha + '</span>' +
          '<p style="margin:4px 0 0;">' + m.mensaje.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>') + '</p>' +
          '</div>';
      }).join('');
    }

    async function enviarMensaje() {
      var texto = document.getElementById('campo-mensaje').value.trim();
      var av = document.getElementById('aviso-mensaje');
      if (!texto) { av.style.display='block'; av.style.color='#842029'; av.textContent='Escribe un mensaje antes de enviar.'; return; }
      var r = await fetch('/api/cliente/mensaje', {
        method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ mensaje: texto })
      });
      var d = await r.json();
      av.style.display = 'block';
      if (d.ok) {
        av.style.color = '#1b5e20';
        av.textContent = '✅ Mensaje enviado.';
        document.getElementById('campo-mensaje').value = '';
        cargarMensajes();
      } else {
        av.style.color = '#842029';
        av.textContent = d.error || 'Error al enviar.';
      }
    }

    async function cerrarSesion() {
      await fetch('/api/cliente/logout', { method: 'POST' });
      window.location.href = '/mi-reserva';
    }

    cargarPortal();
  </script>
</body>
</html>
