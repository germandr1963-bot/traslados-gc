<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mi Reserva — Traslados GC</title>
  <link rel="stylesheet" href="/estilos-chofer.css">
  <style>
    .reserva-card {
      border: 1px solid var(--borde);
      border-radius: 12px;
      margin-bottom: 12px;
      overflow: hidden;
      background: #fff;
    }
    .reserva-card.historial {
      opacity: 0.75;
    }
    .reserva-resumen {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      cursor: pointer;
      gap: 12px;
    }
    .reserva-resumen:hover { background: #fafaf8; }
    .reserva-info { flex: 1; }
    .reserva-pnr {
      font-family: monospace;
      font-size: 15px;
      font-weight: 700;
      color: #C1502E;
      margin-bottom: 4px;
    }
    .reserva-ruta {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 2px;
    }
    .reserva-fecha {
      font-size: 13px;
      color: #5a6c79;
    }
    .estado-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .dot-activa { background: #4caf50; }
    .dot-historial { background: #e53935; }
    .dot-pendiente { background: #ff9800; }
    .reserva-chevron {
      font-size: 12px;
      color: #999;
      transition: transform 0.2s;
      flex-shrink: 0;
    }
    .reserva-chevron.abierto { transform: rotate(180deg); }
    .reserva-detalle {
      display: none;
      border-top: 1px solid var(--borde);
      padding: 20px;
    }
    .reserva-detalle.visible { display: block; }
    .dato-fila {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      font-size: 14px;
      margin-bottom: 16px;
    }
    .dato-fila div strong { display: block; font-size: 11px; color: #5a6c79; font-weight: 600; text-transform: uppercase; margin-bottom: 2px; }
    .seccion-titulo {
      font-size: 13px;
      font-weight: 700;
      color: #444;
      margin: 20px 0 10px;
      padding-bottom: 6px;
      border-bottom: 1px solid var(--borde);
    }
    .campo-mod {
      width: 100%;
      border: 1.5px solid #ddd;
      border-radius: 8px;
      padding: 8px 12px;
      font-size: 14px;
      font-family: inherit;
      margin-top: 4px;
      margin-bottom: 10px;
    }
    .campo-mod:focus { outline: none; border-color: #C1502E; }
    .label-mod { font-size: 12px; font-weight: 600; color: #444; display: block; }
    .mensaje-burbuja {
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 13px;
      margin-bottom: 8px;
      max-width: 85%;
    }
    .msg-cliente { background: #fff3e0; border: 1px solid #ffe0b2; margin-left: auto; }
    .msg-equipo { background: #e8f5e9; border: 1px solid #c8e6c9; }
    .msg-fecha { font-size: 11px; color: #999; margin-top: 4px; }
    .etiqueta-seccion {
      display: inline-block;
      font-size: 11px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 10px;
      margin-bottom: 12px;
      text-transform: uppercase;
    }
    .etiqueta-activa { background: #e8f5e9; color: #2e7d32; }
    .etiqueta-historial { background: #fbe9e7; color: #c62828; }
  </style>
</head>
<body>
  <header class="app">
    <div style="display:flex;align-items:center;gap:10px"><span style="font-weight:700">TRASLADOS GC</span></div>
    <a href="javascript:void(0)" onclick="cerrarSesion()">Cerrar sesión</a>
  </header>

  <main>
    <section id="zona-portal">
      <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;margin-bottom:4px">
        <h1 id="saludo" style="margin:0">Mis reservas</h1>
        <div style="display:flex;gap:8px;flex-wrap:wrap;">
          <a href="/reserva" class="secundario" style="margin:0;padding:8px 18px;text-decoration:none;display:inline-flex;align-items:center;">+ Nueva reserva</a>
          <button class="secundario" style="margin:0;padding:8px 18px" onclick="cargarPortal()">🔄 Actualizar</button>
        </div>
      </div>
      <p class="sub" id="subtitulo"></p>

      <div id="lista-reservas" style="margin-top:20px;"></div>
    </section>
  </main>

  <script>
    var reservasData = [];

    async function cargarPortal() {
      var lista = document.getElementById('lista-reservas');
      lista.innerHTML = '<p style="color:#5a6c79;font-size:14px">Cargando...</p>';
      var r = await fetch('/api/cliente/mi-reserva');
      if (!r.ok) { window.location.href = '/mi-reserva'; return; }
      var d = await r.json();
      reservasData = d.reservas || [];
      document.getElementById('saludo').textContent = 'Hola, ' + (d.nombre ? d.nombre.split(' ')[0] : '');
      document.getElementById('subtitulo').textContent = reservasData.length + ' reserva' + (reservasData.length !== 1 ? 's' : '') + ' encontrada' + (reservasData.length !== 1 ? 's' : '');
      renderLista();
    }

    function renderLista() {
      var lista = document.getElementById('lista-reservas');
      if (!reservasData.length) {
        lista.innerHTML = '<p style="color:#5a6c79;font-size:14px;text-align:center;padding:30px 0">No tienes reservas.</p>';
        return;
      }
      lista.innerHTML = reservasData.map(function(r, i) {
        var fecha = r.fecha ? new Date(r.fecha).toLocaleDateString('es-ES', {weekday:'long', day:'numeric', month:'long', year:'numeric'}) : '—';
        var hora = r.hora ? r.hora.slice(0,5) : '—';
        var esHistorial = r.es_historial;
        var dotClass = esHistorial ? 'dot-historial' : (r.estado === 'pendiente' ? 'dot-pendiente' : r.estado === 'modificacion_pendiente' ? 'dot-pendiente' : 'dot-activa');
        var etiqueta = esHistorial ? '<span class="etiqueta-seccion etiqueta-historial">Realizado</span>' : '<span class="etiqueta-seccion etiqueta-activa">Activo</span>';
        return '<div class="reserva-card' + (esHistorial ? ' historial' : '') + '" id="card-' + i + '">' +
          '<div class="reserva-resumen" onclick="toggleDetalle(' + i + ')">' +
            '<div class="estado-dot ' + dotClass + '"></div>' +
            '<div class="reserva-info">' +
              '<div class="reserva-pnr">' + r.numero_reserva + '</div>' +
              '<div class="reserva-ruta">' + (r.origen || '—') + ' → ' + (r.destino || '—') + '</div>' +
              '<div class="reserva-fecha">📅 ' + fecha + ' · ' + hora + 'h</div>' +
            '</div>' +
            '<span class="reserva-chevron" id="chev-' + i + '">▼</span>' +
          '</div>' +
          '<div class="reserva-detalle" id="detalle-' + i + '">' +
            etiqueta +
            renderDetalle(r, i) +
          '</div>' +
        '</div>';
      }).join('');
    }

    function renderDetalle(r, i) {
      var estadoBadge = { pendiente: '🟡 Pendiente', confirmada: '🟢 Confirmada', completada: '✅ Completada', cancelada: '🔴 Cancelada', modificacion_pendiente: '🟠 Modificación pendiente' };
      var extrasHTML = r.extras && r.extras.length ? r.extras.map(function(e) { return e.nombre + ' (+' + parseFloat(e.precio_en_reserva).toFixed(2) + ' €)'; }).join(', ') : '—';
      var html = '<div class="dato-fila">' +
        '<div><strong>Estado</strong>' + (estadoBadge[r.estado] || r.estado) + '</div>' +
        '<div><strong>Categoría</strong>' + (r.categoria_nombre || '—') + '</div>' +
        '<div><strong>Pasajeros</strong>' + (r.num_pasajeros || '—') + '</div>' +
        '<div><strong>Precio estimado</strong>' + (r.precio_estimado ? parseFloat(r.precio_estimado).toFixed(2) + ' €' : '—') + '</div>' +
        (r.direccion_recogida ? '<div style="grid-column:span 2"><strong>Dirección de recogida</strong>' + r.direccion_recogida + '</div>' : '') +
        (r.direccion_destino ? '<div style="grid-column:span 2"><strong>Dirección de destino</strong>' + r.direccion_destino + '</div>' : '') +
        (r.numero_vuelo ? '<div><strong>Vuelo</strong>' + r.numero_vuelo + (r.hora_llegada_vuelo ? ' · ' + r.hora_llegada_vuelo.slice(0,5) : '') + '</div>' : '') +
        (r.nombre_barco ? '<div><strong>Barco</strong>' + r.nombre_barco + (r.hora_atraque ? ' · ' + r.hora_atraque.slice(0,5) : '') + '</div>' : '') +
        (r.extras && r.extras.length ? '<div style="grid-column:span 2"><strong>Extras</strong>' + extrasHTML + '</div>' : '') +
        '</div>';

      // Conductor si está asignado y pagado
      if (r.conductor_nombre && r.deposito_pagado) {
        html += '<div style="padding:12px;background:#f5f0ea;border-radius:8px;display:flex;align-items:center;gap:14px;margin-bottom:16px;">' +
          (r.conductor_foto && r.conductor_foto_estado === 'aprobada' ? '<img src="' + r.conductor_foto + '" style="width:50px;height:50px;border-radius:50%;object-fit:cover;border:2px solid #C1502E;">' : '') +
          '<div><strong style="font-size:12px;color:#5a6c79;text-transform:uppercase;">Tu conductor</strong><br>' + r.conductor_nombre + '</div></div>';
      }

      // Depósito
      html += '<div class="seccion-titulo">Depósito de garantía</div>';
      if (r.deposito_liberado) {
        html += '<p style="color:#2e7d32;font-size:14px;">✅ Depósito liberado.</p>';
      } else if (r.deposito_pagado) {
        html += '<p style="color:#856404;font-size:14px;">🔒 Depósito retenido de <strong>' + r.noshow.importe + ' €</strong>. Se liberará al completar el servicio.</p>';
      } else {
        html += '<p style="color:#5a6c79;font-size:14px;">⏳ Depósito pendiente de pago.</p>';
      }

      // Solo si no es historial: modificar y mensajes
      if (!r.es_historial) {
        html += '<div class="seccion-titulo">Gestionar reserva</div>';
        html += '<div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px;">' +
          '<a href="/modificar-reserva?pnr=' + r.numero_reserva + '" style="text-decoration:none;flex:1;min-width:140px;">' +
            '<div style="border:2px solid #1565c0;border-radius:10px;padding:12px 16px;text-align:center;background:#e3f2fd;cursor:pointer;">' +
              '<div style="font-size:20px;margin-bottom:4px;">✏️</div>' +
              '<div style="font-size:13px;font-weight:600;color:#1565c0;">Modificar reserva</div>' +
              '<div style="font-size:11px;color:#888;margin-top:2px;">Cambia fecha, extras, categoría…</div>' +
            '</div>' +
          '</a>' +
          '<div style="flex:1;min-width:140px;cursor:pointer;" onclick="cancelarReserva(' + r.id + ', \'' + r.numero_reserva + '\', ' + i + ')">' +
            '<div style="border:2px solid #c62828;border-radius:10px;padding:12px 16px;text-align:center;background:#fdf2f2;">' +
              '<div style="font-size:20px;margin-bottom:4px;">❌</div>' +
              '<div style="font-size:13px;font-weight:600;color:#c62828;">Cancelar reserva</div>' +
              '<div style="font-size:11px;color:#888;margin-top:2px;">Anular esta reserva</div>' +
            '</div>' +
          '</div>' +
          '</div>';
        html += '<div id="aviso-cancelar-' + i + '" style="display:none;font-size:13px;margin-bottom:12px;"></div>';

        // Factura disponible
        if (r.tiene_factura) {
          html += '<div style="margin-bottom:12px;">' +
            '<a href="/api/cliente/factura/' + r.id + '" download style="display:inline-flex;align-items:center;gap:8px;background:#e8f5e9;border:1px solid #c8e6c9;border-radius:8px;padding:10px 16px;font-size:13px;font-weight:600;color:#2e7d32;text-decoration:none;">📄 Descargar factura</a>' +
          '</div>';
        }

        // Mensajes — colapsado por defecto
        var numMsg = r.mensajes_sin_leer || 0;
        html += '<div style="border:1px solid var(--borde-suave);border-radius:10px;overflow:hidden;margin-bottom:12px;">' +
          '<div style="display:flex;align-items:center;justify-content:space-between;padding:12px 16px;cursor:pointer;background:#f9f7f4;" onclick="toggleMensajes(' + i + ',' + r.id + ')">' +
            '<span style="font-size:13px;font-weight:600;color:var(--texto-oscuro);">💬 Mensajes del equipo' +
              (numMsg > 0 ? ' <span style="background:#C1502E;color:#fff;border-radius:10px;padding:1px 8px;font-size:11px;margin-left:6px;">' + numMsg + ' nuevos</span>' : '') +
            '</span>' +
            '<span id="chev-msg-' + i + '" style="color:#aaa;font-size:13px;">▼</span>' +
          '</div>' +
          '<div id="bloque-mensajes-' + i + '" style="display:none;padding:14px 16px;border-top:1px solid var(--borde-suave);">' +
            '<div id="hilo-cliente-' + i + '" style="display:flex;flex-direction:column;gap:8px;max-height:200px;overflow-y:auto;margin-bottom:10px;"></div>' +
            '<div id="sin-msg-' + i + '" style="font-size:13px;color:#aaa;text-align:center;padding:8px 0;display:none;">Sin mensajes aún.</div>' +
            '<textarea id="texto-msg-' + i + '" rows="2" placeholder="Escribe un mensaje al equipo…" style="width:100%;border:1px solid var(--borde-suave);border-radius:6px;padding:8px 10px;font-size:13px;font-family:inherit;resize:vertical;box-sizing:border-box;"></textarea>' +
            '<button onclick="enviarMensajeCliente(' + i + ',' + r.id + ')" style="margin-top:6px;background:var(--terracota);color:#fff;border:none;border-radius:6px;padding:8px 18px;font-size:13px;font-weight:600;cursor:pointer;">Enviar mensaje</button>' +
            '<div id="aviso-msg-' + i + '" style="display:none;font-size:12px;margin-top:6px;"></div>' +
          '</div>' +
        '</div>';
      }

      return html;
    }

    function toggleDetalle(i) {
      var detalle = document.getElementById('detalle-' + i);
      var chev = document.getElementById('chev-' + i);
      var abierto = detalle.classList.toggle('visible');
      chev.classList.toggle('abierto', abierto);
    }

    function toggleMensajes(i, reservaId) {
      var bloque = document.getElementById('bloque-mensajes-' + i);
      var chev = document.getElementById('chev-msg-' + i);
      var abierto = bloque.style.display !== 'none';
      if (abierto) {
        bloque.style.display = 'none';
        chev.textContent = '▼';
      } else {
        bloque.style.display = 'block';
        chev.textContent = '▲';
        cargarMensajesCliente(i, reservaId);
      }
    }

    function cargarMensajesCliente(i, reservaId) {
      var hilo = document.getElementById('hilo-cliente-' + i);
      var sinMsg = document.getElementById('sin-msg-' + i);
      fetch('/api/cliente/mensajes?reserva_id=' + reservaId)
        .then(function(r) { return r.json(); })
        .then(function(d) {
          if (!d.mensajes || !d.mensajes.length) {
            hilo.innerHTML = '';
            if (sinMsg) sinMsg.style.display = 'block';
            return;
          }
          if (sinMsg) sinMsg.style.display = 'none';
          hilo.innerHTML = d.mensajes.map(function(m) {
            var fecha = new Date(m.creado_en).toLocaleDateString('es-ES', {day:'numeric', month:'short', hour:'2-digit', minute:'2-digit'});
            var esEquipo = m.autor === 'admin';
            return '<div style="background:' + (esEquipo ? '#e8f5e9' : '#fff3e0') + ';border:1px solid ' + (esEquipo ? '#c8e6c9' : '#ffe0b2') + ';border-radius:8px;padding:9px 13px;font-size:13px;">' +
              '<div style="font-weight:600;color:' + (esEquipo ? '#2e7d32' : '#e65100') + ';font-size:12px;margin-bottom:3px;">' +
              (esEquipo ? '👨‍💼 Equipo' : '👤 Tú') + ' · ' + fecha + '</div>' +
              '<div>' + m.mensaje.replace(/</g,'&lt;').replace(/>/g,'&gt;').split('\n').join('<br>') + '</div>' +
            '</div>';
          }).join('');
          hilo.scrollTop = hilo.scrollHeight;
        });
    }

    async function enviarMensajeCliente(i, reservaId) {
      var campo = document.getElementById('texto-msg-' + i);
      var av = document.getElementById('aviso-msg-' + i);
      var texto = campo ? campo.value.trim() : '';
      if (!texto) return;
      var r = await fetch('/api/cliente/mensaje', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ reserva_id: reservaId, mensaje: texto })
      });
      var d = await r.json();
      if (d.ok) {
        campo.value = '';
        if (av) { av.style.display = 'block'; av.style.color = '#2e7d32'; av.textContent = '✅ Mensaje enviado.'; setTimeout(function() { av.style.display = 'none'; }, 3000); }
        cargarMensajesCliente(i, reservaId);
      } else {
        if (av) { av.style.display = 'block'; av.style.color = '#c62828'; av.textContent = d.error || 'Error al enviar.'; }
      }
    }

    async function cancelarReserva(reservaId, pnr, i) {
      var av = document.getElementById('aviso-cancelar-' + i);
      if (!confirm('¿Seguro que quieres cancelar la reserva ' + pnr + '? Esta acción no se puede deshacer.')) return;
      var r = await fetch('/api/cliente/cancelar', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ reserva_id: reservaId })
      });
      var d = await r.json();
      if (d.ok) {
        av.style.display = 'block'; av.style.color = '#2e7d32';
        av.textContent = '✅ Reserva cancelada. Recibirás un email de confirmación.';
        setTimeout(function() { cargarPortal(); }, 2000);
      } else {
        av.style.display = 'block'; av.style.color = '#842029';
        av.textContent = d.error || 'Error al cancelar.';
      }
    }

    async function guardarModificaciones(i, reservaId) {
      // Función mantenida por compatibilidad — ya no se usa en el nuevo flujo
    }

    async function cerrarSesion() {
      await fetch('/api/cliente/logout', { method: 'POST' });
      window.location.href = '/';
    }

    cargarPortal();
  </script>
</body>
</html>
