<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Acceso Choferes — Traslados GC</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #1C1815;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: #fff;
      border-radius: 16px;
      padding: 40px 36px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    }
    .logo {
      text-align: center;
      margin-bottom: 32px;
    }
    .logo h1 { font-size: 22px; color: #C1502E; font-weight: 700; letter-spacing: 1px; }
    .logo p { font-size: 13px; color: #888; margin-top: 4px; }
    .logo .badge {
      display: inline-block;
      background: #f5f0ea;
      color: #6b5c44;
      font-size: 11px;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 10px;
      margin-top: 8px;
      letter-spacing: 0.5px;
    }
    label { display: block; font-size: 13px; font-weight: 600; color: #444; margin-bottom: 5px; }
    input {
      width: 100%;
      border: 1.5px solid #ddd;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 15px;
      color: #2c2c2c;
      margin-bottom: 18px;
      transition: border-color 0.2s;
    }
    input:focus { outline: none; border-color: #C1502E; }
    .boton {
      width: 100%;
      background: #C1502E;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 12px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    .boton:hover { background: #8a3a20; }
    .boton:disabled { opacity: 0.6; cursor: not-allowed; }
    .error {
      background: #fdf0ee;
      border: 1px solid #e8b4a8;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      color: #842029;
      margin-bottom: 16px;
      display: none;
    }
    @media (max-width: 420px) { .card { padding: 28px 20px; } }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <h1>TRASLADOS GC</h1>
      <p>Gran Canaria</p>
      <span class="badge">🚗 Portal de Choferes</span>
    </div>
    <div id="error" class="error"></div>
    <label for="email">Email</label>
    <input type="email" id="email" placeholder="tucorreo@email.com" autocomplete="email">
    <label for="password">Contraseña</label>
    <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
    <button class="boton" id="btn-login" onclick="login()">Entrar</button>
  </div>
  <script>
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') login();
    });
    function login() {
      var email = document.getElementById('email').value.trim();
      var password = document.getElementById('password').value;
      var err = document.getElementById('error');
      var btn = document.getElementById('btn-login');
      err.style.display = 'none';
      if (!email || !password) {
        err.textContent = 'Introduce tu email y contraseña.';
        err.style.display = 'block';
        return;
      }
      btn.disabled = true;
      btn.textContent = 'Entrando...';
      fetch('/chofer/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email: email, password: password })
      })
      .then(function(r) { return r.json(); })
      .then(function(data) {
        if (data.error) {
          err.textContent = data.error;
          err.style.display = 'block';
          btn.disabled = false;
          btn.textContent = 'Entrar';
          return;
        }
        window.location.href = '/chofer/portal';
      })
      .catch(function() {
        err.textContent = 'Error de conexión. Inténtalo de nuevo.';
        err.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Entrar';
      });
    }
  </script>
</body>
</html>
